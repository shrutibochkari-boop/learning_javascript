<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Calculator</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width: 350px;">
    <h3 class="text-center mb-3">Arithmetic Operations Using Functions  </h3>

    <input type="number" id="num1" class="form-control mb-2" placeholder="Enter first number">
    <input type="number" id="num2" class="form-control mb-3" placeholder="Enter second number">

    <div class="d-flex gap-2 mb-3">
        <button class="btn btn-primary flex-fill" onclick="calculate('+')">+</button>
        <button class="btn btn-primary flex-fill" onclick="calculate('-')">-</button>
        <button class="btn btn-primary flex-fill" onclick="calculate('*')">×</button>
        <button class="btn btn-primary flex-fill" onclick="calculate('/')">÷</button>
    </div>

    <button class="btn btn-success w-100" onclick="showResult()">Result</button>

    <h4 class="text-center mt-3">Result: <span id="result">0</span></h4>
</div>

<script>
    let currentResult = 0;
    let operation = '';

    function calculate(op) {
        const num1 = parseFloat(document.getElementById('num1').value);
        const num2 = parseFloat(document.getElementById('num2').value);
        operation = op;

        if (isNaN(num1) || isNaN(num2)) {
            alert('Please enter valid numbers.');
            return;
        }

        switch(op) {
            case '+':
                currentResult = num1 + num2;
                break;
            case '-':
                currentResult = num1 - num2;
                break;
            case '*':
                currentResult = num1 * num2;
                break;
            case '/':
                if (num2 === 0) {
                    alert('Cannot divide by zero!');
                    currentResult = 0;
                } else {
                    currentResult = num1 / num2;
                }
                break;
        }
    }

    function showResult() {
        document.getElementById('result').textContent = currentResult;
    }
</script>

</body>
</html>
