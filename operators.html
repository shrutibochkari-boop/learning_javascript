<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // Assignement Operators
        var x = 10; // Assignment operator
        var y = 5;
        x += y; // Addition assignment operator (x = x + y)
        document.write(x + "<br>"); // Output: 15
        document.write(y); // Output: 5
    </script>

    <script>
        // Comparison Operators
        var a = 10;
        var b = 20;
        if(a==b) {
            document.write("true");
        } else {
            document.write("false");
        }
       
    </script>
    <script>
        // Logical Operators
        var p = true;
        var q = false;
        if(p && q) {
            document.write("Both are true");
        } else {
            document.write("At least one is false");
        }
    </script>
</body>
</html>
